repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]

  - repo: local
    hooks:
      - id: golangci-lint
        name: golangci-lint
        language: system
        # GOWORK=off isolates this module from any parent go.work file.
        entry: bash -c "GOWORK=off golangci-lint run ./..."
        types: [go]
        pass_filenames: false
