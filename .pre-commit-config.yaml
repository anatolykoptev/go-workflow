repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=500]

  - repo: local
    hooks:
      - id: golangci-lint
        name: golangci-lint
        language: system
        # GOWORK=off required: ~/go.work lists ./src/go-workflow but worktrees
        # live outside that path, causing "pattern ./...: directory prefix does
        # not contain modules listed in go.work". Set GOWORK=off to isolate.
        entry: bash -c "GOWORK=off golangci-lint run ./..."
        types: [go]
        pass_filenames: false
